name: Windows installer

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run check

      - name: Bundle local Jarvis voice
        shell: powershell
        run: npm run voice:install:jarvis

      - name: Bundle local Whisper recognition
        shell: powershell
        run: npm run voice:install:local-asr

      - name: Build Windows installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GDDXX-Jarvis-Windows-x64
          path: dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe
          if-no-files-found: error
          retention-days: 14
