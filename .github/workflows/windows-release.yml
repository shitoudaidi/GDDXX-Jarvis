name: Windows installer

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($tagVersion -ne $packageVersion) { throw "Tag $tagVersion does not match package version $packageVersion" }

      - name: Run release checks
        run: npm run check

      - name: Bundle local Jarvis voice
        shell: powershell
        run: npm run voice:install:jarvis

      - name: Bundle local Whisper recognition
        shell: powershell
        run: npm run voice:install:local-asr

      - name: Build Windows installer
        shell: powershell
        run: |
          npm run dist 2>&1 | Tee-Object -FilePath build-output.log
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content build-output.log -Tail 60) -join '%0A'
            Write-Output "::error title=Windows installer build failed::$tail"
            exit 1
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GDDXX-Jarvis-Windows-x64
          path: dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Create SHA-256 checksum
        shell: powershell
        run: |
          $installer = Get-ChildItem dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe | Select-Object -First 1
          if (-not $installer -or $installer.Length -lt 1MB) { throw "Installer is missing or unexpectedly small" }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -Encoding ascii "dist/$($installer.Name).sha256"

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: GDDXX-Jarvis-Windows-x64-SHA256
          path: dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
          files: |
            dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe
            dist/GDDXX-Jarvis-Windows-x64-Setup-*.exe.sha256
